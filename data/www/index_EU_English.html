	<link rel="stylesheet" href="./css/all.min.css" media="screen">
	<script src="./js/lib.min.js"></script>
</head>

<body data-content-lang="EU_English">
	<article id="helloworld" class="current">
		<!-- Top screen content -->
		<div class="topContent">
			<div class="topText01">
				<p class="inner">This is the top screen</p>
			</div>
		</div>

		<!-- Bottom screen content -->
		<div class="bottomContent">
			<div class="btText01">
				<p class="inner">This is the bottom screen</p>
			</div>

			<div class="btCommon">
				<a href="#" class="btCommonBtn02 _btn_back black">Exit</a>
				<a href="#" class="btCommonBtn03 _btn_next">Reload Page</a>
			</div>
		</div>
	</article>
	<script>
		"use strict"

		cave.snd_playBgm("ACT_5")
		cave.act_setHeaderMessage("This is a header message")

		$('.btCommonBtn02').on('click', function () {
			cave.snd_playSe('SE_ACT_END')
			cave.jump_toSettingsTop()
		})
		$('.btCommonBtn03').on('click', function () {
			cave.snd_playSe('SE_ACT_OK_SUB')
			location.reload()
		})
	</script>
</body>
